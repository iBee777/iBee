<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>เกมส์ระบายอารมณ์ ของคนอินโทรเวิร์ด</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;800&family=Sarabun:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
  html,body { width:100%; height:100%; overflow:hidden; background:#15100d; font-family:'Sarabun',sans-serif; touch-action:none; }
  #stage { position:relative; width:100%; height:100%; }
  canvas { display:block; position:absolute; inset:0; width:100%; height:100%; }

  #hud { position:absolute; top:0; left:0; right:0; padding:18px 20px; display:flex; justify-content:space-between; align-items:flex-start; pointer-events:none; z-index:5; }
  #counter { font-family:'Prompt',sans-serif; color:#f3e6d8; }
  #counter .num { font-size:34px; font-weight:800; line-height:1; transition:color 400ms ease, text-shadow 400ms ease; }
  #counter .label { font-size:12px; letter-spacing:1.5px; opacity:0.65; margin-top:2px; }
  #levelTag { font-family:'Prompt',sans-serif; font-weight:600; font-size:12px; letter-spacing:2px; margin-top:8px; padding:4px 10px; border-radius:100px; display:inline-block; opacity:0.9; transition:all 400ms ease; }

  #msg { font-family:'Prompt',sans-serif; font-weight:600; font-size:15px; color:#f3e6d8; text-align:right; max-width:190px; opacity:0.85; line-height:1.4; }

  #progressWrap { position:absolute; bottom:44px; left:50%; transform:translateX(-50%); width:min(320px,70vw); z-index:5; pointer-events:none; }
  #progressTrack { height:5px; border-radius:100px; background:rgba(255,255,255,0.12); overflow:hidden; }
  #progressFill { height:100%; width:0%; border-radius:100px; transition:width 350ms ease, background 400ms ease; }

  #intro, #levelUp { position:absolute; inset:0; z-index:20; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:32px; }
  #intro { background:radial-gradient(ellipse at center, #241a15 0%, #120d0a 75%); }
  #introLogos { display:flex; align-items:center; justify-content:center; gap:16px; margin-bottom:22px; }
  #introLogos img { height:64px; width:auto; border-radius:12px; box-shadow:0 4px 18px rgba(0,0,0,0.5); background:#fff; }
  #introLogos img.logoCircle { width:64px; height:64px; border-radius:50%; object-fit:cover; object-position:center 30%; border:2px solid rgba(255,255,255,0.7); }
  #intro h1 { font-family:'Prompt',sans-serif; font-weight:800; font-size:clamp(28px,7vw,44px); color:#f3e6d8; letter-spacing:0.5px; }
  #intro .sub { font-family:'Prompt',sans-serif; font-weight:600; color:#ff7a45; font-size:14px; letter-spacing:3px; margin-bottom:14px; text-transform:uppercase; }
  #intro p { color:#c9b8a8; margin-top:14px; font-size:15px; line-height:1.7; max-width:340px; }
  #startBtn { margin-top:32px; padding:15px 40px; border-radius:100px; border:none; background:linear-gradient(135deg,#ff7a45,#e0472a); color:#1a1005; font-family:'Prompt',sans-serif; font-weight:800; font-size:16px; letter-spacing:0.5px; cursor:pointer; box-shadow:0 8px 30px rgba(255,90,40,0.35); }
  #startBtn:active { transform:scale(0.96); }

  #levelUp { background:rgba(10,8,7,0.72); backdrop-filter: blur(3px); opacity:0; pointer-events:none; transition:opacity 350ms ease; z-index:15; }
  #levelUp.show { opacity:1; }
  #levelUp .tag { font-family:'Prompt',sans-serif; font-weight:600; letter-spacing:3px; font-size:13px; opacity:0.8; text-transform:uppercase; }
  #levelUp .title { font-family:'Prompt',sans-serif; font-weight:800; font-size:clamp(30px,8vw,52px); color:#fff; margin-top:6px; }
  #levelUp .name { font-family:'Prompt',sans-serif; font-weight:600; font-size:18px; margin-top:10px; opacity:0.9; }

  #floorLabel { position:absolute; bottom:14px; left:0; right:0; text-align:center; font-family:'Prompt',sans-serif; font-size:12px; letter-spacing:2px; color:#8a7263; opacity:0.7; pointer-events:none; z-index:5; }

  #soundToggle { position:absolute; top:18px; left:50%; transform:translateX(-50%); z-index:6; pointer-events:auto; background:rgba(0,0,0,0.35); border:1px solid rgba(255,255,255,0.15); color:#f3e6d8; font-family:'Prompt',sans-serif; font-size:12px; padding:6px 14px; border-radius:100px; cursor:pointer; letter-spacing:1px; }

  .flash { position:absolute; inset:0; background:#fff; opacity:0; pointer-events:none; z-index:8; }
</style>
</head>

  </div>

  <div id="progressWrap">
    <div id="progressTrack"><div id="progressFill"></div></div>
  </div>

  <div id="floorLabel">ลากขึ้น • ปล่อย • ปา</div>

    <div class="title" id="levelUpTitle">ด่าน 2</div>

    <h1>เกมส์ระบายอารมณ์<br>ของคนอินโทรเวิร์ด</h1>
    <p>หยิบของแล้วลากขึ้นเพื่อขว้างใส่กำแพงให้แตกกระจาย ปาไปเรื่อย ๆ ห้องจะเปลี่ยนไปเรื่อย ๆ พร้อมของเล่นใหม่ให้ปา</p>
    <button id="startBtn">เริ่มปา</button>
  </div>
</div>

<script>
(function(){
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const shakeEl = document.getElementById('shake');
  const flashEl = document.getElementById('flash');
  const numVal = document.getElementById('numVal');
  const msgEl = document.getElementById('msg');
  const intro = document.getElementById('intro');
  const startBtn = document.getElementById('startBtn');
  const levelTag = document.getElementById('levelTag');
  const levelUpEl = document.getElementById('levelUp');
  const levelUpTitle = document.getElementById('levelUpTitle');
  const levelUpName = document.getElementById('levelUpName');
  const progressFill = document.getElementById('progressFill');
  const soundToggle = document.getElementById('soundToggle');

  let W, H, DPR;
  function resize(){
    DPR = Math.min(window.devicePixelRatio||1, 2);
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W*DPR; canvas.height = H*DPR;
    canvas.style.width = W+'px'; canvas.style.height = H+'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  const WALL_Y = () => H*0.14;
  const WALL_H = () => H*0.62;
  const FLOOR_Y = () => WALL_Y() + WALL_H();

  const messages = [
    "ปาต่อไป กำแพงไม่โกรธหรอก",
    "แรง ๆ อีกนิดก็ได้นะ",
    "เออ ปล่อยมันไปให้หมด",
    "แตกดีนะ เสียงมันสะใจ",
    "ทำได้ดีมาก หายใจลึก ๆ",
    "จะเก็บไว้ในใจทำไม ปาซะ",
    "อีกชิ้นนึงไหม?",
    "ค่อย ๆ นะ ไม่ต้องรีบ"
  ];
  function randMsg(){ msgEl.textContent = messages[Math.floor(Math.random()*messages.length)]; }

  // ================= SOUND ENGINE =================
  let actx = null;
  let soundOn = true;
  let noiseBuf = null;
  function ensureAudio(){
    if(actx) return;
    actx = new (window.AudioContext||window.webkitAudioContext)();
    const len = actx.sampleRate*1.2;
    noiseBuf = actx.createBuffer(1, len, actx.sampleRate);
    const d = noiseBuf.getChannelData(0);
    for(let i=0;i<len;i++) d[i] = Math.random()*2-1;
  }
  function master(gainVal){
    const g = actx.createGain();
    g.gain.value = gainVal;
    g.connect(actx.destination);
    return g;
  }
  function playNoiseBurst({dur=0.25, type='lowpass', freq=800, Q=1, gain=0.5, freqEnd=null}){
    if(!soundOn || !actx) return;
    const src = actx.createBufferSource();
    src.buffer = noiseBuf;
    const filt = actx.createBiquadFilter();
    filt.type = type; filt.frequency.value = freq; filt.Q.value = Q;
    if(freqEnd!=null) filt.frequency.exponentialRampToValueAtTime(Math.max(30,freqEnd), actx.currentTime+dur);
    const g = master(gain);
    g.gain.setValueAtTime(gain, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime+dur);
    src.connect(filt); filt.connect(g);
    src.start(); src.stop(actx.currentTime+dur+0.05);
  }
  function playTone({freq=440, dur=0.2, type='sine', gain=0.3, glideTo=null, delay=0}){
    if(!soundOn || !actx) return;
    const osc = actx.createOscillator();
    osc.type = type; osc.frequency.value = freq;
    const t0 = actx.currentTime+delay;
    if(glideTo!=null) osc.frequency.exponentialRampToValueAtTime(Math.max(20,glideTo), t0+dur);
    const g = master(0.0001);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(gain, t0+0.015);
    g.gain.exponentialRampToValueAtTime(0.001, t0+dur);
    osc.connect(g);
    osc.start(t0); osc.stop(t0+dur+0.05);
  }

  // ================= STATE =================
  let cracks = [];
  let shards = [];
  let count = 0;

  function growCrack(x, y, angle, len, depth, baseWidth){
    const segs = [];
    let cx=x, cy=y, a=angle;
    const segCount = 3 + Math.floor(Math.random()*3);
    const segLen = len/segCount;
    for(let s=0; s<segCount; s++){
      a += (Math.random()-0.5)*0.75;
      const stepLen = segLen*(0.65+Math.random()*0.7);
      const nx = cx + Math.cos(a)*stepLen;
      const ny = cy + Math.sin(a)*stepLen;
      const w = Math.max(0.4, baseWidth*(1 - (s/segCount)*0.65));
      segs.push({x1:cx,y1:cy,x2:nx,y2:ny,w});
      cx = nx; cy = ny;
      if(depth<1 && s>0 && s<segCount-1 && Math.random()<0.4){
        const branchAngle = a + (Math.random()>0.5?1:-1)*(0.5+Math.random()*0.9);
        segs.push(...growCrack(cx, cy, branchAngle, stepLen*(2+Math.random()*2), depth+1, w*0.65));
      }
    }
    return segs;
  }

  function addCrack(x, y, size){
    const segments = [];
    const mainCount = 3 + Math.floor(Math.random()*3);
    const usedAngles = [];
    for(let i=0;i<mainCount;i++){
      let angle, tries=0;
      do { angle = Math.random()*Math.PI*2; tries++; }
      while(tries<8 && usedAngles.some(a=>Math.abs(a-angle)<0.55));
      usedAngles.push(angle);
      segments.push(...growCrack(x, y, angle, size*(0.7+Math.random()*0.9), 0, 2.4));
    }
    cracks.push({x,y,segments,color:theme.crackColor});
    if(cracks.length>40) cracks.shift();
  }

  function spawnShards(x,y,type){
    const n = type.shards;
    for(let i=0;i<n;i++){
      const ang = Math.random()*Math.PI*2;
      const speed = 2+Math.random()*6;
      shards.push({
        x, y,
        vx: Math.cos(ang)*speed,
        vy: Math.sin(ang)*speed - 2,
        rot: Math.random()*Math.PI*2,
        vr: (Math.random()-0.5)*0.4,
        size: 4+Math.random()*10,
        color: Math.random()>0.3? type.color : type.rim,
        life: 1,
        glass: type.material==='glass',
        metal: type.material==='metal'
      });
    }
    if(type.splat){
      for(let i=0;i<14;i++){
        const ang = Math.random()*Math.PI*2;
        const speed = 1+Math.random()*4;
        shards.push({
          x,y, vx:Math.cos(ang)*speed, vy:Math.sin(ang)*speed-1,
          rot:0, vr:0, size:3+Math.random()*5, color:type.splat, life:1, drip:true
        });

    }
  }

  function doShake(){
    const dur = 260;
    const start = performance.now();
    function step(now){
      const elapsed = now-start;
      if(elapsed>dur){ shakeEl.style.transform=''; return; }
      const p = 1 - elapsed/dur;
      const mag = 10*p;
      const dx = (Math.random()-0.5)*mag;
      const dy = (Math.random()-0.5)*mag;
      shakeEl.style.transform = `translate(${dx}px,${dy}px)`;
      requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  // ================= HELD OBJECT / THROW =================
  let held = null;

  function newHeld(){

  function pointerPos(e){
    const t = e.touches ? e.touches[0] : e;
    return { x: t.clientX, y: t.clientY };
  }

  function onDown(e){
    if(!held) return;
    ensureAudio();
    if(actx && actx.state==='suspended') actx.resume();
    dragging = true;
    const p = pointerPos(e);
    trail = [{...p, t:performance.now()}];
  }
  function onMove(e){
    if(!dragging) return;
    const p = pointerPos(e);
    held.x = p.x; held.y = p.y;
    trail.push({...p, t:performance.now()});
    if(trail.length>8) trail.shift();
  }
  function onUp(){
    if(!dragging || !held) return;
    dragging = false;
    const p = trail.length? trail[trail.length-1] : held;
    const first = trail[0] || p;
    let vx = (p.x-first.x);
    let vy = (p.y-first.y);
    const dt = Math.max(1, (trail[trail.length-1]?.t||0) - (trail[0]?.t||0));
    vx = vx/dt*16; vy = vy/dt*16;
    const speed = Math.hypot(vx,vy);

    if(speed < 3 || vy > -1){
      held.x = W/2; held.y = H*0.86;
      return;
    }
    playThrowSound();
    launchProjectile(held, vx, vy);
    held = null;
    setTimeout(newHeld, 550);
  }

  let projectiles = [];
  function launchProjectile(h, vx, vy){
    projectiles.push({
      type: h.type,
      x: h.x, y: h.y,

      rot: 0, vr: (Math.random()-0.5)*0.3,
      gravity: 0.55

  function updateProjectiles(){
    for(let i=projectiles.length-1;i>=0;i--){
      const p = projectiles[i];
      p.vy += p.gravity;
      p.x += p.vx;
      p.y += p.vy;
      p.rot += p.vr;

      const reachedWallPlane = p.y <= WALL_Y() + WALL_H()*0.98;

      if(p.y <= FLOOR_Y() && reachedWallPlane){
        const cx = Math.max(20, Math.min(W-20, p.x));
        const cy = Math.max(WALL_Y()+10, Math.min(FLOOR_Y()-5, p.y));
        addCrack(cx, cy, p.type.r*0.8);
        spawnShards(cx, cy, p.type);
        flash();
        doShake();
        playImpact(p.type.material);
        count++; numVal.textContent = count;
        throwsThisLevel++;
        randMsg();
        maybeLevelUp();
        projectiles.splice(i,1);
        continue;
      }
      if(p.y > H+100 || p.x < -100 || p.x > W+100){
        projectiles.splice(i,1);
      }
    }
  }

  function updateShards(){
    for(let i=shards.length-1;i>=0;i--){
      const s = shards[i];
      s.vy += 0.35;
      s.x += s.vx; s.y += s.vy;
      s.rot += s.vr;
      s.vx *= 0.99;
      s.life -= 0.012;
      if(s.life<=0 || s.y>H+50) shards.splice(i,1);
    }
  }

  // ================= DRAWING =================
  function drawWall(){
    const wy = WALL_Y(), wh = WALL_H();
    const grad = ctx.createLinearGradient(0,wy,0,wy+wh);
    grad.addColorStop(0,theme.wallTop);
    grad.addColorStop(1,theme.wallBot);
    ctx.fillStyle = grad;
    ctx.fillRect(0,wy,W,wh);

    ctx.strokeStyle = theme.lineColor;
    ctx.lineWidth = 1;

    if(theme.pattern==='brick'){
      const brickH = 26; let row=0;
      for(let y=wy; y<wy+wh; y+=brickH){
        ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
        const offset = (row%2===0)? 0 : 40;
        for(let x=-offset; x<W; x+=80){
          ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x,Math.min(y+brickH,wy+wh)); ctx.stroke();
        }
        row++;
      }
    } else if(theme.pattern==='panel'){
      const panelW = 120;
      for(let x=0;x<W;x+=panelW){
        ctx.beginPath(); ctx.moveTo(x,wy); ctx.lineTo(x,wy+wh); ctx.stroke();
      }
      ctx.beginPath(); ctx.moveTo(0,wy+wh*0.5); ctx.lineTo(W,wy+wh*0.5); ctx.stroke();
    } else if(theme.pattern==='wood'){
      const plankH = 44;
      for(let y=wy;y<wy+wh;y+=plankH){
        ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
      }
    } else if(theme.pattern==='neon'){
      const grid = 60;
      ctx.lineWidth = 1;
      for(let x=0;x<W;x+=grid){ ctx.beginPath(); ctx.moveTo(x,wy); ctx.lineTo(x,wy+wh); ctx.stroke(); }
      for(let y=wy;y<wy+wh;y+=grid){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
    } else if(theme.pattern==='gold'){
      const panelW = 160;
      for(let x=0;x<W;x+=panelW){
        ctx.beginPath(); ctx.moveTo(x,wy); ctx.lineTo(x,wy+wh); ctx.stroke();
      }
    }

    const vg = ctx.createRadialGradient(W/2,wy+wh/2,wh*0.2,W/2,wy+wh/2,wh*0.9);
    vg.addColorStop(0,'rgba(0,0,0,0)');
    vg.addColorStop(1,'rgba(0,0,0,0.35)');
    ctx.fillStyle = vg;
    ctx.fillRect(0,wy,W,wh);

    const fgrad = ctx.createLinearGradient(0,FLOOR_Y(),0,H);
    fgrad.addColorStop(0,theme.floorTop);
    fgrad.addColorStop(1,theme.floorBot);
    ctx.fillStyle = fgrad;
    ctx.fillRect(0,FLOOR_Y(),W,H-FLOOR_Y());
  }

  function drawCracks(){
    ctx.save();
    ctx.lineCap = 'round';
    for(const c of cracks){
      const col = c.color || theme.crackColor;
      ctx.strokeStyle = col;
      for(const seg of c.segments){
        ctx.lineWidth = seg.w;
        ctx.beginPath();
        ctx.moveTo(seg.x1, seg.y1);
        ctx.lineTo(seg.x2, seg.y2);
        ctx.stroke();
      }
      ctx.fillStyle = col;
      ctx.beginPath();
      ctx.arc(c.x, c.y, 2.4, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawObject(o, x, y, rot){
    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(rot||0);
    const t = o;
    ctx.fillStyle = t.color;
    ctx.strokeStyle = t.rim;
    switch(t.draw){
      case 'plate':
        ctx.beginPath(); ctx.ellipse(0,0,t.r,t.r*0.55,0,0,Math.PI*2); ctx.fill();
        ctx.lineWidth=3; ctx.beginPath(); ctx.ellipse(0,0,t.r*0.7,t.r*0.38,0,0,Math.PI*2); ctx.stroke();
        break;
      case 'glass':
        ctx.fillStyle = t.color+'cc'; ctx.lineWidth=2;
        ctx.beginPath();
        ctx.moveTo(-t.r*0.5,-t.r*0.9); ctx.lineTo(t.r*0.5,-t.r*0.9);
        ctx.lineTo(t.r*0.35,t.r*0.9); ctx.lineTo(-t.r*0.35,t.r*0.9);
        ctx.closePath(); ctx.fill(); ctx.stroke();
        break;
      case 'vase':
        ctx.beginPath();
        ctx.moveTo(-t.r*0.3,-t.r);
        ctx.quadraticCurveTo(-t.r*0.9,0, -t.r*0.4,t.r);
        ctx.lineTo(t.r*0.4,t.r);
        ctx.quadraticCurveTo(t.r*0.9,0, t.r*0.3,-t.r);
        ctx.closePath(); ctx.fill(); ctx.lineWidth=2; ctx.stroke();
        break;
      case 'egg':
        ctx.beginPath(); ctx.ellipse(0,0,t.r*0.7,t.r,0,0,Math.PI*2); ctx.fill();
        ctx.lineWidth=1.5; ctx.stroke();
        break;
      case 'mug':
        ctx.beginPath(); ctx.roundRect(-t.r*0.5,-t.r*0.6,t.r,t.r*1.2,6); ctx.fill(); ctx.stroke();
        ctx.beginPath(); ctx.arc(t.r*0.6,0,t.r*0.35,-1.1,1.1); ctx.lineWidth=4; ctx.stroke();
        break;
      case 'keyboard':
        ctx.beginPath(); ctx.roundRect(-t.r,-t.r*0.5,t.r*2,t.r,4); ctx.fill(); ctx.stroke();
        ctx.fillStyle='#000000aa';
        for(let i=-3;i<=3;i++) for(let j=-1;j<=1;j++) ctx.fillRect(i*t.r*0.26-4,j*t.r*0.3-4,7,7);
        break;
      case 'phone':
        ctx.beginPath(); ctx.roundRect(-t.r*0.5,-t.r,t.r,t.r*2,8); ctx.fill(); ctx.stroke();
        ctx.fillStyle = t.rim; ctx.fillRect(-t.r*0.4,-t.r*0.85,t.r*0.8,t.r*1.55);
        break;
      case 'book':
        ctx.beginPath(); ctx.roundRect(-t.r*0.7,-t.r*0.9,t.r*1.4,t.r*1.8,3); ctx.fill(); ctx.stroke();
        ctx.strokeStyle='#00000033'; ctx.beginPath(); ctx.moveTo(0,-t.r*0.9); ctx.lineTo(0,t.r*0.9); ctx.stroke();
        break;
      case 'watermelon':
        ctx.beginPath(); ctx.arc(0,0,t.r,0,Math.PI*2); ctx.fill(); ctx.lineWidth=3; ctx.stroke();
        ctx.strokeStyle='#2c6b3a55';
        for(let i=0;i<4;i++){ ctx.beginPath(); ctx.arc(0,0,t.r*(0.3+i*0.18),0,Math.PI*2); ctx.stroke(); }
        break;
      case 'pot':
        ctx.beginPath(); ctx.moveTo(-t.r*0.8,-t.r*0.6); ctx.lineTo(t.r*0.8,-t.r*0.6);
        ctx.lineTo(t.r*0.55,t.r*0.7); ctx.lineTo(-t.r*0.55,t.r*0.7); ctx.closePath();
        ctx.fill(); ctx.lineWidth=2; ctx.stroke();
        ctx.beginPath(); ctx.ellipse(0,-t.r*0.6,t.r*0.8,t.r*0.15,0,0,Math.PI*2); ctx.stroke();
        break;
      case 'discoball':
        ctx.beginPath(); ctx.arc(0,0,t.r,0,Math.PI*2); ctx.fill(); ctx.lineWidth=1;
        for(let i=0;i<6;i++){ ctx.beginPath(); ctx.moveTo(-t.r,i*t.r/3-t.r); ctx.lineTo(t.r,i*t.r/3-t.r); ctx.stroke(); }
        for(let i=0;i<6;i++){ ctx.beginPath(); ctx.ellipse(0,0,t.r*(1-i/7),t.r,0,0,Math.PI*2); ctx.stroke(); }
        break;
      case 'neonsign':
        ctx.strokeStyle = t.color; ctx.lineWidth=4; ctx.shadowColor=t.color; ctx.shadowBlur=14;
        ctx.beginPath(); ctx.roundRect(-t.r,-t.r*0.6,t.r*2,t.r*1.2,10); ctx.stroke();
        ctx.shadowBlur=0;
        break;
      case 'trophy':
        ctx.beginPath(); ctx.moveTo(-t.r*0.5,-t.r); ctx.lineTo(t.r*0.5,-t.r);
        ctx.lineTo(t.r*0.3,t.r*0.1); ctx.lineTo(-t.r*0.3,t.r*0.1); ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.fillRect(-t.r*0.15,t.r*0.1,t.r*0.3,t.r*0.4);
        ctx.beginPath(); ctx.roundRect(-t.r*0.4,t.r*0.5,t.r*0.8,t.r*0.2,3); ctx.fill();
        break;
      case 'piggybank':
        ctx.beginPath(); ctx.ellipse(0,0,t.r,t.r*0.72,0,0,Math.PI*2); ctx.fill(); ctx.lineWidth=2; ctx.stroke();
        ctx.beginPath(); ctx.ellipse(t.r*0.85,-t.r*0.1,t.r*0.22,t.r*0.18,0,0,Math.PI*2); ctx.fill();
        break;
      default:
        ctx.beginPath(); ctx.arc(0,0,t.r,0,Math.PI*2); ctx.fill(); ctx.stroke();
    }
    ctx.restore();
  }

  function drawShards(){
    for(const s of shards){
      ctx.save();
      ctx.globalAlpha = Math.max(0,s.life);
      ctx.translate(s.x,s.y);
      ctx.rotate(s.rot);
      ctx.fillStyle = s.color;
      if(s.glass){
        ctx.beginPath();
        ctx.moveTo(0,-s.size); ctx.lineTo(s.size*0.6,s.size*0.5); ctx.lineTo(-s.size*0.6,s.size*0.5);
        ctx.closePath(); ctx.fill();
      } else if(s.metal){
        ctx.fillRect(-s.size*0.6,-s.size*0.2,s.size*1.2,s.size*0.4);
      } else if(s.drip){
        ctx.beginPath(); ctx.ellipse(0,0,s.size*0.5,s.size*0.7,0,0,Math.PI*2); ctx.fill();
      } else {
        ctx.fillRect(-s.size/2,-s.size/2,s.size,s.size);
      }
      ctx.restore();
    }
  }

  function drawHeld(){
    if(!held) return;
    if(dragging && trail.length>1){
      ctx.save();
      ctx.strokeStyle = theme.accent+'55';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(trail[0].x, trail[0].y);
      for(const p of trail) ctx.lineTo(p.x,p.y);
      ctx.stroke();
      ctx.restore();
    }
    drawObject(held.type, held.x, held.y, 0);
  }

  function drawProjectiles(){
    for(const p of projectiles){
      drawObject(p.type, p.x, p.y, p.rot);
    }
  }

  function loop(){
    ctx.clearRect(0,0,W,H);
    drawWall();
    drawCracks();
    updateProjectiles();
    drawProjectiles();
    updateShards();
    drawShards();
    drawHeld();
    requestAnimationFrame(loop);
  }

  startBtn.addEventListener('click', ()=>{
    ensureAudio();
    intro.style.transition = 'opacity 400ms ease';
    intro.style.opacity = '0';
    setTimeout(()=>{ intro.style.display='none'; }, 400);
    updateHUD();
    newHeld();
    loop();
  });

  resize();
  ctx.clearRect(0,0,W,H);
  drawWall();
})();
</script>
</body>
</html>
